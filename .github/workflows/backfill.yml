name: backfill

# Manual one-shot (and re-runnable): rebuild a multi-year history of factor rows from the free data
# sources and publish the refreshed state DB. Model training is intentionally out of scope.
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Factor backfill start date (YYYY-MM-DD)"
        default: "2024-06-15"
      end_date:
        description: "Factor backfill end date (YYYY-MM-DD); blank = today"
        default: ""

permissions:
  contents: write

concurrency:
  group: sqlite-state
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  STATE_BRANCH: state
  STATE_DB_PATH: data/state/energy_etf_monitor.sqlite
  ENERGY_ETF_MONITOR_DATABASE_URL: sqlite:///data/state/energy_etf_monitor.sqlite
  ENERGY_ETF_MONITOR_EIA_API_KEY: ${{ secrets.ENERGY_ETF_MONITOR_EIA_API_KEY }}
  ENERGY_ETF_MONITOR_FRED_API_KEY: ${{ secrets.ENERGY_ETF_MONITOR_FRED_API_KEY }}
  ENERGY_ETF_MONITOR_CFTC_APP_TOKEN: ${{ secrets.ENERGY_ETF_MONITOR_CFTC_APP_TOKEN }}

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Restore SQLite state (if present)
        run: bash .github/scripts/restore-state-db.sh
      - name: Install
        run: uv sync
      - name: Initialize database schema
        run: uv run energy-etf-monitor init-db
      - name: Resolve end date
        id: dates
        run: echo "end=${END:-$(date -u +%F)}" >> "$GITHUB_OUTPUT"
        env:
          END: ${{ inputs.end_date }}
      - name: Backfill data and factor rows
        run: |
          set -e
          uv run energy-etf-monitor ingest-etf-holdings --load || echo "official ETF holdings skipped"
          uv run energy-etf-monitor ingest-wisdomtree-metrics --load || echo "WisdomTree ETF metrics skipped"
          for C in WTI NATGAS RBOB BRENT; do
            LC=$(echo "$C" | tr 'A-Z' 'a-z')
            echo "::group::$C ingest history"
            uv run energy-etf-monitor ingest-phase0 --commodity "$C" --load
            uv run energy-etf-monitor ingest-yahoo-history --commodity "$C" --range "10y" --load
            uv run energy-etf-monitor ingest-yahoo-curve-history --commodity "$C" \
              --start-date "${{ inputs.start_date }}" --end-date "${{ steps.dates.outputs.end }}" --load
            echo "::endgroup::"
            echo "::group::$C factor rows"
            uv run energy-etf-monitor build-feature-range --commodity "$C" \
              --start-date "${{ inputs.start_date }}" --end-date "${{ steps.dates.outputs.end }}" \
              --as-of-time "23:00:00+00:00"
            uv run energy-etf-monitor export-feature-cache --commodity "$C" --output-path "/tmp/$LC.parquet"
            echo "::endgroup::"
          done
      - name: Push SQLite state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/push-state-db.sh
