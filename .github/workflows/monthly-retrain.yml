name: monthly-retrain

on:
  schedule:
    # 06:00 UTC on the 1st of each month.
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: monthly-retrain
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      ENERGY_ETF_MONITOR_DATABASE_URL: ${{ secrets.ENERGY_ETF_MONITOR_DATABASE_URL }}
      ENERGY_ETF_MONITOR_EIA_API_KEY: ${{ secrets.ENERGY_ETF_MONITOR_EIA_API_KEY }}
      ENERGY_ETF_MONITOR_FRED_API_KEY: ${{ secrets.ENERGY_ETF_MONITOR_FRED_API_KEY }}
      ENERGY_ETF_MONITOR_CFTC_APP_TOKEN: ${{ secrets.ENERGY_ETF_MONITOR_CFTC_APP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install
        run: uv sync
      - name: Initialize database schema
        run: uv run energy-etf-monitor init-db
      - name: Retrain models from accumulated history
        run: uv run energy-etf-monitor retrain --models-dir models
      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
          else
            git commit -m "chore: monthly model retrain [skip ci]"
            git push
          fi
      - name: Email on failure
        if: ${{ failure() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[energy-etf-monitor] monthly retrain failed"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: energy-etf-monitor <${{ secrets.SMTP_USERNAME }}>
          body: |
            The scheduled monthly retrain failed.
            Run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
