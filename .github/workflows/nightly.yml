name: nightly

on:
  schedule:
    # Weekdays at 22:00 UTC — after the US energy-futures settlement window.
    # EIA (Wed) and COT (Fri) releases are picked up on their respective days.
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      # Point at a hosted Postgres (e.g. Supabase / Neon free tier) so state persists across runs.
      ENERGY_ETF_MONITOR_DATABASE_URL: ${{ secrets.ENERGY_ETF_MONITOR_DATABASE_URL }}
      ENERGY_ETF_MONITOR_EIA_API_KEY: ${{ secrets.ENERGY_ETF_MONITOR_EIA_API_KEY }}
      ENERGY_ETF_MONITOR_FRED_API_KEY: ${{ secrets.ENERGY_ETF_MONITOR_FRED_API_KEY }}
      ENERGY_ETF_MONITOR_CFTC_APP_TOKEN: ${{ secrets.ENERGY_ETF_MONITOR_CFTC_APP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install (with gbm extra)
        run: uv sync --extra gbm
      - name: Initialize database schema
        run: uv run energy-etf-monitor init-db
      - name: Run nightly pipeline
        run: |
          uv run energy-etf-monitor run-nightly \
            --price-artifact models/wti_price_logistic.json \
            --spread-artifact models/wti_spread_logistic.json
      - name: Email on failure
        if: ${{ failure() }}
        uses: dawidd6/action-send-mail@v3
        with:
          # For SMTP over SSL use port 465 with secure: true; for STARTTLS use 587 + secure: false.
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[energy-etf-monitor] nightly run failed"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: energy-etf-monitor <${{ secrets.SMTP_USERNAME }}>
          body: |
            The scheduled nightly run failed.
            Run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
