name: nightly

on:
  schedule:
    # Weekdays at 22:00 UTC — after the US energy-futures settlement window.
    # EIA (Wed) and COT (Fri) releases are picked up on their respective days.
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sqlite-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      STATE_BRANCH: state
      STATE_DB_PATH: data/state/energy_etf_monitor.sqlite
      ENERGY_ETF_MONITOR_DATABASE_URL: sqlite:///data/state/energy_etf_monitor.sqlite
      ENERGY_ETF_MONITOR_EIA_API_KEY: ${{ secrets.ENERGY_ETF_MONITOR_EIA_API_KEY }}
      ENERGY_ETF_MONITOR_FRED_API_KEY: ${{ secrets.ENERGY_ETF_MONITOR_FRED_API_KEY }}
      ENERGY_ETF_MONITOR_CFTC_APP_TOKEN: ${{ secrets.ENERGY_ETF_MONITOR_CFTC_APP_TOKEN }}
      ENERGY_ETF_MONITOR_MARKETAUX_API_KEY: ${{ secrets.ENERGY_ETF_MONITOR_MARKETAUX_API_KEY }}
      ENERGY_ETF_MONITOR_ANTHROPIC_API_KEY: ${{ secrets.ENERGY_ETF_MONITOR_ANTHROPIC_API_KEY }}
      ENERGY_ETF_MONITOR_NEWS_CLASSIFIER: ${{ vars.ENERGY_ETF_MONITOR_NEWS_CLASSIFIER || 'rule' }}
      ENERGY_ETF_MONITOR_ALERT_WEBHOOK_URL: ${{ secrets.ENERGY_ETF_MONITOR_ALERT_WEBHOOK_URL }}
      ENERGY_ETF_MONITOR_ALERT_WEBHOOK_KIND: ${{ vars.ENERGY_ETF_MONITOR_ALERT_WEBHOOK_KIND || 'slack' }}
    steps:
      - uses: actions/checkout@v4
      - name: Restore SQLite state
        run: bash .github/scripts/restore-state-db.sh
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install (with gbm extra)
        run: uv sync --extra gbm
      - name: Initialize database schema
        run: uv run energy-etf-monitor init-db
      - name: Run nightly pipeline
        run: |
          uv run energy-etf-monitor run-nightly \
            --price-artifact models/wti_price_logistic.json \
            --spread-artifact models/wti_spread_logistic.json
      - name: Predict NatGas and RBOB
        # run-nightly already ingested all commodities' data; build + score their latest row too,
        # if their models exist (created by the backfill workflow). Best-effort: never fail the run.
        run: |
          NOW=$(date -u +%FT%H:%M:%S+00:00)
          for C in NATGAS RBOB; do
            LC=$(echo "$C" | tr 'A-Z' 'a-z')
            if [ -f "models/${LC}_price_logistic.json" ] && [ -f "models/${LC}_spread_logistic.json" ]; then
              uv run energy-etf-monitor build-features --commodity "$C" --as-of "$NOW" || true
              uv run energy-etf-monitor predict-daily --commodity "$C" \
                --price-artifact "models/${LC}_price_logistic.json" \
                --spread-artifact "models/${LC}_spread_logistic.json" --load || echo "predict skipped for $C"
            else
              echo "No $C models yet; run the backfill workflow to create them."
            fi
          done
      - name: Push SQLite state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/push-state-db.sh
      - name: Email on failure
        if: ${{ failure() }}
        uses: dawidd6/action-send-mail@v3
        with:
          # For SMTP over SSL use port 465 with secure: true; for STARTTLS use 587 + secure: false.
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[energy-etf-monitor] nightly run failed"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: energy-etf-monitor <${{ secrets.SMTP_USERNAME }}>
          body: |
            The scheduled nightly run failed.
            Run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
