name: ci

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install (dev + optional extras)
        run: uv sync --extra dev --extra gbm --extra dashboard
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -q
